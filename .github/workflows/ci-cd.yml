# ============================================
# FILE: .github/workflows/ci-cd.yml
# ============================================
# Triggers on push to main or pull requests
# Pipeline: Lint → Test → Build → Deploy
# ============================================

name: Climate Intelligence CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  API_IMAGE: climate-api
  DASHBOARD_IMAGE: climate-dashboard
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  # ==========================================
  # JOB 1: LINT — Code quality checks
  # ==========================================
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run flake8 (syntax & style)
        run: |
          flake8 api/ --max-line-length=120 --ignore=E501,W503,E402 --count --show-source
          flake8 dashboard/ --max-line-length=120 --ignore=E501,W503,E402 --count --show-source

      - name: Check formatting with black
        run: black --check --line-length=120 api/ dashboard/ || true

      - name: Check import order
        run: isort --check-only --profile black api/ dashboard/ || true

  # ==========================================
  # JOB 2: TEST — Run test suite
  # ==========================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-api.txt
          pip install pytest

      - name: Run data pipeline tests
        run: |
          pytest tests/ -v -k "TestDataPipeline" --tb=short || true

      - name: Run ML model tests
        run: |
          pytest tests/ -v -k "TestMLModels" --tb=short || true

      - name: Verify API imports
        run: |
          python -c "from api.main import app; print('✅ API imports OK')"

  # ==========================================
  # JOB 3: BUILD — Docker images
  # ==========================================
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & Push API image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.API_IMAGE }}:latest \
                        -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.API_IMAGE }}:${{ github.sha }} \
                        -f Dockerfile.api .
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.API_IMAGE }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & Push Dashboard image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.DASHBOARD_IMAGE }}:latest \
                        -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} \
                        -f Dockerfile.dashboard .
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.DASHBOARD_IMAGE }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

  # ==========================================
  # JOB 4: DEPLOY — to Cloud Run
  # ==========================================
  deploy:
    name: 🚀 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy climate-api \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.API_IMAGE }}:latest \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            --set-env-vars "GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}"

      - name: Get API URL
        id: api_url
        run: |
          URL=$(gcloud run services describe climate-api --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "api_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ API deployed at: $URL"

      - name: Deploy Dashboard to Cloud Run
        run: |
          gcloud run deploy climate-dashboard \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/climate-platform/${{ env.DASHBOARD_IMAGE }}:latest \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "API_URL=${{ steps.api_url.outputs.api_url }}"

      - name: Get Dashboard URL
        run: |
          URL=$(gcloud run services describe climate-dashboard --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "✅ Dashboard deployed at: $URL"

      - name: Verify API health
        run: |
          sleep 10
          curl -f ${{ steps.api_url.outputs.api_url }}/ || echo "⚠️ API health check failed"